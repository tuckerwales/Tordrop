name: Build & Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build app bundle
        run: make app

      - name: Read version
        id: version
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" Info.plist)
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="v${VERSION}-build.${{ github.run_number }}+${SHORT_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Package app bundle
        run: |
          ditto -c -k --sequesterRsrc --keepParent TorDrop.app "TorDrop-${{ steps.version.outputs.tag }}.zip"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: TorDrop ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: TorDrop-${{ steps.version.outputs.tag }}.zip
